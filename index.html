<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kedai Titik Nol - POS System</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Custom Configuration (Coksu & Krem Theme) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            krem: {
              50: '#FAF7F2',
              100: '#F0EBE1',
              200: '#E1D7C6',
              300: '#D3C2A8',
              400: '#C5AD8B',
            },
            coksu: {
              50: '#F5F0EB',
              100: '#EAE1D5',
              200: '#D5C2AB',
              300: '#C0A381',
              400: '#AD855B',
              500: '#96683F', // Primary Coksu (Milk Chocolate)
              600: '#805532', // Hover State
              700: '#664227', // Text accents
              800: '#4C311C', // Dark Text
              900: '#332013', // Deep Espresso (Sidebar)
            }
          }
        }
      }
    }
  </script>
  
  <!-- React 18 & Babel Standalone -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts - Plus Jakarta Sans for Modern Aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Hubungan Fisik ke manifest.json (Wajib bagi PWA Desktop) -->
  <link rel="manifest" href="manifest.json">

  <!-- Libraries for Export (Excel & PDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <!-- iOS PWA Support Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Titik Nol POS">
  <link rel="apple-touch-icon" href="https://placehold.co/192x192/96683F/FAF7F2?text=TN">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #FAF7F2; /* krem-50 */
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Aturan Cetak untuk Struk Kasir */
    @media print {
      body * {
        visibility: hidden;
      }
      #print-area, #print-area * {
        visibility: visible;
      }
      #print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        max-width: 80mm;
        margin: 0;
        padding: 10px;
        border: none;
        box-shadow: none;
      }
    }

    /* Scrollbar Styling with Coksu/Krem tones */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #E1D7C6; /* krem-200 */
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #D3C2A8; /* krem-300 */
    }
  </style>
  </head>
  <body class="bg-krem-50 min-h-screen text-coksu-900 overflow-x-hidden">
  
    <div id="root"></div>
    <!-- ==================== UI / TAMPILAN HTML ==================== -->
    
    <!-- 1. Form Produk (Admin) -->
    <form id="formProduk">
      <input type="text" id="prodId" placeholder="ID Produk" required>
      <input type="text" id="prodNama" placeholder="Nama Produk" required>
      <input type="text" id="prodKategori" placeholder="Kategori">
      <input type="number" id="prodHargaBeli" placeholder="Harga Beli">
      <input type="number" id="prodHargaJual" placeholder="Harga Jual">
      <input type="number" id="prodStok" placeholder="Stok">
      <input type="text" id="prodBarcode" placeholder="Barcode">
      <button type="submit">Simpan Produk</button>
    </form>
  
    <!-- 2. Section Kasir (POS) -->
    <div id="sectionKasir">
      <select id="metodeBayar">
        <option value="Tunai">Tunai</option>
        <option value="QRIS">QRIS</option>
      </select>
      <button id="btnProsesBayar" onclick="prosesPembayaran()">Proses Bayar</button>
    </div>
  
  
    <!-- ==================== JAVASCRIPT ==================== -->
<script>
  // 1. DEKLARASI VARIABLE GLOBAL & API (WAJIB DI PALING ATAS)
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgXYVGw3inp1gcKkIJIQkprv7FqtC2dZxnaVHuJOcQ3Huh5Us5jNRcNigzMi9goMOgzA/exec";
  
  let daftarProduk = [];
  let keranjangBelanja = [];
  let totalBelanja = 0;
  let nilaiDiskon = 0;
  let nominalDibayar = 0;

  // 2. FUNGSI FETCH API (PENGAMBILAN & PENGIRIMAN DATA TO SHEETS)
  async function getProduk() {
    try {
      const response = await fetch(`${APPS_SCRIPT_URL}?action=getProduk`);
      const data = await response.json();
      return data;
    } catch (error) {
      console.error("Gagal mengambil data produk:", error);
      return [];
    }
  }

  async function simpanProduk(produkData) {
    const payload = { action: "saveProduk", produk: produkData };
    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      alert(result.message);
      renderKatalogProduk(); // Refresh daftar produk setelah simpan
    } catch (error) {
      console.error("Gagal menyimpan produk:", error);
    }
  }

  async function kirimTransaksi(dataTransaksi, listKeranjang) {
    const payload = {
      action: "tambahTransaksi",
      transaksi: dataTransaksi,
      items: listKeranjang
    };
    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      if (result.status === "success") {
        alert("🎉 Transaksi Berhasil!");
        keranjangBelanja = []; // Reset keranjang
        renderKeranjangUI();
        renderKatalogProduk(); // Refresh stok barang terbaru
      }
    } catch (error) {
      console.error("Error submit transaksi:", error);
    }
  }

  // 3. FUNGSI RENDERING UI & INTERAKSI
  async function renderKatalogProduk() {
    const container = document.getElementById("katalogProduk");
    if (!container) return;

    container.innerHTML = `<p class="text-center py-4 text-gray-500">⏳ Memuat data produk...</p>`;

    daftarProduk = await getProduk();

    if (!daftarProduk || daftarProduk.length === 0) {
      container.innerHTML = `<p class="text-center py-4 text-red-500">Belum ada data produk.</p>`;
      return;
    }

    let htmlContent = "";
    daftarProduk.forEach((item) => {
      htmlContent += `
        <tr class="border-b hover:bg-gray-50">
          <td class="p-2 font-mono text-sm">${item.id_produk}</td>
          <td class="p-2 font-semibold">${item.nama_produk}</td>
          <td class="p-2 text-sm text-gray-600">${item.kategori || "-"}</td>
          <td class="p-2 text-right">Rp ${Number(item.harga_jual).toLocaleString('id-ID')}</td>
          <td class="p-2 text-center">
            <span class="px-2 py-1 text-xs rounded ${item.stok > 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
              ${item.stok}
            </span>
          </td>
          <td class="p-2 text-center">
            <button onclick="tambahKeKeranjang('${item.id_produk}')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">
              + Tambah
            </button>
          </td>
        </tr>
      `;
    });

    container.innerHTML = htmlContent;
  }

  function tambahKeKeranjang(idProduk) {
    const produk = daftarProduk.find(p => p.id_produk === idProduk);
    if (!produk) return;

    if (produk.stok <= 0) {
      alert("Stok produk ini habis!");
      return;
    }

    const itemExist = keranjangBelanja.find(item => item.id_produk === idProduk);

    if (itemExist) {
      if (itemExist.qty + 1 > produk.stok) {
        alert("Jumlah melebihi stok yang tersedia!");
        return;
      }
      itemExist.qty += 1;
      itemExist.subtotal = itemExist.qty * itemExist.harga_satuan;
    } else {
      keranjangBelanja.push({
        id_produk: produk.id_produk,
        nama_produk: produk.nama_produk,
        qty: 1,
        harga_satuan: Number(produk.harga_jual),
        subtotal: Number(produk.harga_jual)
      });
    }

    renderKeranjangUI();
  }

  function renderKeranjangUI() {
    const container = document.getElementById("listKeranjang");
    const totalElem = document.getElementById("textTotalBelanja");
    
    if (!container) return;

    if (keranjangBelanja.length === 0) {
      container.innerHTML = `<p class="text-gray-400 text-center py-4">Keranjang masih kosong</p>`;
      if (totalElem) totalElem.innerText = "Rp 0";
      totalBelanja = 0;
      return;
    }

    let html = "";
    totalBelanja = 0;

    keranjangBelanja.forEach((item, index) => {
      totalBelanja += item.subtotal;
      html += `
        <div class="flex justify-between items-center border-b py-2">
          <div>
            <p class="font-medium text-sm">${item.nama_produk}</p>
            <p class="text-xs text-gray-500">${item.qty} x Rp ${item.harga_satuan.toLocaleString('id-ID')}</p>
          </div>
          <div class="flex items-center gap-2">
            <span class="font-bold text-sm">Rp ${item.subtotal.toLocaleString('id-ID')}</span>
            <button onclick="hapusItemKeranjang(${index})" class="text-red-500 text-xs hover:underline">Hapus</button>
          </div>
        </div>
      `;
    });

    container.innerHTML = html;
    if (totalElem) totalElem.innerText = `Rp ${totalBelanja.toLocaleString('id-ID')}`;
    nominalDibayar = totalBelanja;
  }

  function hapusItemKeranjang(index) {
    keranjangBelanja.splice(index, 1);
    renderKeranjangUI();
  }

  function bukaTab(namaTab) {
    const sections = document.querySelectorAll('.tab-content');
    sections.forEach(sec => sec.classList.add('hidden'));

    const targetTab = document.getElementById(namaTab);
    if (targetTab) {
      targetTab.classList.remove('hidden');
    }

    if (namaTab === 'tabKasir' || namaTab === 'tabProduk') {
      renderKatalogProduk();
    }
  }

  // 4. HANDLER EVENT LISTENER (EVENT FORM & TOMBOL)
  document.getElementById("formProduk")?.addEventListener("submit", async function(e) {
    e.preventDefault();
    const produkData = {
      id_produk: document.getElementById("prodId").value,
      nama_produk: document.getElementById("prodNama").value,
      kategori: document.getElementById("prodKategori").value,
      harga_beli: Number(document.getElementById("prodHargaBeli").value),
      harga_jual: Number(document.getElementById("prodHargaJual").value),
      stok: Number(document.getElementById("prodStok").value),
      barcode: document.getElementById("prodBarcode").value
    };

    await simpanProduk(produkData);
    this.reset();
  });

  async function prosesPembayaran() {
    if (keranjangBelanja.length === 0) {
      alert("Keranjang masih kosong!");
      return;
    }

    const dataTransaksi = {
      id_transaksi: "TRX-" + Date.now(),
      tanggal: new Date().toISOString().split('T')[0],
      waktu: new Date().toLocaleTimeString('id-ID', { hour12: false }),
      kasir: "Admin",
      metode_pembayaran: document.getElementById("metodeBayar").value,
      total_belanja: totalBelanja,
      diskon: nilaiDiskon,
      total_bayar: nominalDibayar
    };

    await kirimTransaksi(dataTransaksi, keranjangBelanja);
  }

  // 5. AUTO INITIALIZE DATA SAAT HALAMAN SELESAI LOAD
  document.addEventListener("DOMContentLoaded", () => {
    renderKatalogProduk();
  });
  </script>

  <style>
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fade-in-up { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scale-up { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    .animate-fade-in-up { animation: fade-in-up 0.4s ease-out forwards; }
    .animate-scale-up { animation: scale-up 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-slide-up { animation: slide-up 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    
    /* Env Safe Area for Modern Mobile Phones (Notch) */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>

</body>
