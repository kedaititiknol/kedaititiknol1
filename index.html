<body class="bg-krem-50 min-h-screen text-coksu-900 overflow-x-hidden">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const initialCategories = [
      { id: 1, name: 'Kopi' },
      { id: 2, name: 'Non-Kopi' },
      { id: 3, name: 'Makanan' },
      { id: 4, name: 'Snack' }
    ];

    const initialProducts = [
      { id: 1, name: 'Kopi Susu Titik Nol', categoryId: 1, stock: 50, costPrice: 8000, sellPrice: 15000 },
      { id: 2, name: 'Americano', categoryId: 1, stock: 30, costPrice: 5000, sellPrice: 12000 },
      { id: 3, name: 'Matcha Latte', categoryId: 2, stock: 20, costPrice: 10000, sellPrice: 18000 },
      { id: 4, name: 'Nasi Goreng Spesial', categoryId: 3, stock: 15, costPrice: 12000, sellPrice: 25000 },
      { id: 5, name: 'Kentang Goreng', categoryId: 4, stock: 40, costPrice: 6000, sellPrice: 12000 },
    ];

    const initialExpenses = [
      { id: 1, date: new Date().toISOString(), description: 'Beli Biji Kopi', amount: 150000 },
      { id: 2, date: new Date().toISOString(), description: 'Listrik & Air', amount: 300000 },
    ];

    const initialTransactions = [
      { 
        id: 'TRX-1001', 
        date: new Date(Date.now() - 86400000).toISOString(), 
        items: [{ productId: 1, name: 'Kopi Susu Titik Nol', qty: 2, price: 15000, subtotal: 30000 }], 
        total: 30000, 
        payment: 50000,
        change: 20000,
        cashier: 'Super Admin',
        paymentMethod: 'Tunai'
      }
    ];

    const formatRupiah = (number) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    };

    const formatDate = (isoString) => {
      const date = new Date(isoString);
      return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYkN9EQCDkR6NgkfY3ZAp8K0Xh9WJqb4Y5EOR4xH1ZImEdDLRJ5gvO-OcZOGFX2-SGtQ/exec";

    const Icon = ({ name, size = 20, className = "" }) => {
      const paths = {
        dashboard: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />,
        cart: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />,
        package: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />,
        fileText: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />,
        settings: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />,
        logout: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />,
        plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />,
        edit: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />,
        trash2: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />,
        printer: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />,
        search: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
        dollarSign: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
        trendingUp: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />,
        trendingDown: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6" />,
        clock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />,
        user: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />,
        checkCircle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />,
        wifi: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7.5 7.5 0 010 10m-2.236-8.236a4.5 4.5 0 010 6.472M12 17h.01M16.24 7.76a10.5 10.5 0 010 14.84" />,
        wifiOff: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.5M5 12.5a10.94 10.94 0 015.83-2.84M14 14.25a3.98 3.98 0 011 .75M9 15a3.98 3.98 0 001.5 2.5M12 17a1 1 0 100 2 1 1 0 000-2z" />,
        refreshCw: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.2 8H17" />,
        cloud: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />,
        menu: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />,
        close: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />,
        download: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />,
        deviceMobile: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />,
        alertCircle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      };

      return (
        <svg 
          className={`inline-block ${className}`} 
          width={size} 
          height={size} 
          fill="none" 
          viewBox="0 0 24 24" 
          stroke="currentColor"
        >
          {paths[name] || <circle cx="12" cy="12" r="10" strokeWidth="2" />}
        </svg>
      );
    };

    const InteractiveSvgChart = ({ data }) => {
      const maxVal = Math.max(...data.map(d => d.amount), 1);
      const width = 500;
      const height = 220;
      const padding = 40;
      
      const chartWidth = width - padding * 2;
      const chartHeight = height - padding * 2;
      
      return (
        <div className="w-full h-full flex flex-col justify-between">
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
            {[0, 0.25, 0.5, 0.75, 1].map((ratio, idx) => {
              const y = padding + chartHeight * (1 - ratio);
              const val = Math.round(maxVal * ratio);
              return (
                <g key={idx}>
                  <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#E1D7C6" strokeWidth="1" strokeDasharray="4 4" />
                  <text x={padding - 8} y={y + 4} textAnchor="end" className="text-[10px] font-semibold fill-coksu-400">
                    {val >= 1000000 ? `${(val/1000000).toFixed(1)}M` : val >= 1000 ? `${Math.round(val/1000)}k` : val}
                  </text>
                </g>
              );
            })}

            {data.map((item, idx) => {
              const barWidth = chartWidth / data.length - 24;
              const barHeight = (item.amount / maxVal) * chartHeight;
              const x = padding + idx * (chartWidth / data.length) + 12;
              const y = padding + chartHeight - barHeight;
              
              const colors = {
                'Omzet': ['#C5AD8B', '#AD855B'],
                'Pengeluaran': ['#ef4444', '#dc2626'],
                'Laba Kotor': ['#D5C2AB', '#96683F']
              };
              const activeColor = colors[item.name] || ['#C0A381', '#96683F'];

              return (
                <g key={idx} className="group cursor-pointer">
                  <defs>
                    <linearGradient id={`grad-${idx}`} x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stopColor={activeColor[0]} />
                      <stop offset="100%" stopColor={activeColor[1]} />
                    </linearGradient>
                  </defs>
                  
                  <rect 
                    x={x} 
                    y={y} 
                    width={barWidth} 
                    height={barHeight} 
                    rx="8" 
                    fill={`url(#grad-${idx})`}
                    className="transition-all duration-300 hover:opacity-80"
                  />
                  
                  <text 
                    x={x + barWidth / 2} 
                    y={y - 8} 
                    textAnchor="middle" 
                    className="text-[10px] font-bold fill-coksu-800 opacity-0 group-hover:opacity-100 transition-opacity duration-200"
                  >
                    {formatRupiah(item.amount)}
                  </text>

                  <text 
                    x={x + barWidth / 2} 
                    y={height - padding + 16} 
                    textAnchor="middle" 
                    className="text-[11px] font-bold fill-coksu-700"
                  >
                    {item.name}
                  </text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    };

    const SidebarItem = ({ icon, label, active, onClick }) => (
      <button onClick={onClick} className={`flex items-center space-x-3 w-full p-3.5 rounded-2xl transition-all duration-200 border border-transparent ${active ? 'bg-coksu-500 text-white font-bold shadow-sm' : 'text-coksu-300 hover:bg-coksu-800 hover:text-white font-semibold'}`}>
        {icon} <span className="text-sm tracking-wide">{label}</span>
      </button>
    );

    const StatCard = ({ title, value, icon, bg }) => (
      <div className="bg-white rounded-3xl border border-krem-200 p-5 md:p-6 flex items-center shadow-[0_4px_20px_rgb(0,0,0,0.01)] transition-transform hover:-translate-y-0.5">
        <div className={`w-12 h-12 md:w-14 md:h-14 rounded-2xl ${bg} flex items-center justify-center mr-4 shadow-sm shrink-0`}>{icon}</div>
        <div className="min-w-0">
          <p className="text-[9px] md:text-[10px] text-coksu-400 font-extrabold uppercase tracking-wider truncate">{title}</p>
          <h3 className="text-base md:text-xl font-black text-coksu-800 mt-1 truncate">{value}</h3>
        </div>
      </div>
    );

    const AdminDashboard = ({ transactions, products, expenses }) => {
      const totalOmzet = transactions.reduce((sum, trx) => sum + trx.total, 0);
      const totalExpenses = expenses.reduce((sum, exp) => sum + exp.amount, 0);
      
      let totalHPP = 0;
      transactions.forEach(trx => trx.items.forEach(item => {
        const product = products.find(p => p.id === item.productId);
        if (product) totalHPP += product.costPrice * item.qty;
      }));

      const netProfit = totalOmzet - totalHPP - totalExpenses;
      const lowStockProducts = products.filter(p => p.stock < 10);
      const recentTransactions = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

      return (
        <div className="space-y-6 pb-24 lg:pb-0 animate-fade-in-up">
          <div>
            <h1 className="text-2xl md:text-3xl font-extrabold text-coksu-900 tracking-tight">Dashboard Utama</h1>
            <p className="text-coksu-500 font-medium text-xs md:text-sm mt-1">Ringkasan performa bisnis Kedai Titik Nol saat ini.</p>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            <StatCard title="Total Omzet" value={formatRupiah(totalOmzet)} icon={<Icon name="trendingUp" className="text-emerald-500" size={20} />} bg="bg-emerald-50" />
            <StatCard title="Total HPP" value={formatRupiah(totalHPP)} icon={<Icon name="package" className="text-blue-500" size={20} />} bg="bg-blue-50" />
            <StatCard title="Total Pengeluaran" value={formatRupiah(totalExpenses)} icon={<Icon name="trendingDown" className="text-red-500" size={20} />} bg="bg-red-50" />
            <StatCard title="Laba Bersih" value={formatRupiah(netProfit)} icon={<Icon name="dollarSign" className="text-amber-500" size={20} />} bg="bg-amber-50" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-krem-200 p-5 md:p-6 flex flex-col justify-between">
              <div>
                <h3 className="text-base md:text-lg font-bold text-coksu-800 mb-4 flex items-center">
                  <Icon name="fileText" className="mr-2 text-coksu-500" /> Transaksi Terakhir
                </h3>
                
                {/* Tampilan Desktop Table */}
                <div className="hidden md:block overflow-x-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="border-b-2 border-krem-100 text-[10px] font-bold text-coksu-400 uppercase tracking-widest">
                        <th className="pb-3 pr-2">ID Transaksi</th>
                        <th className="pb-3 px-2">Waktu</th>
                        <th className="pb-3 px-2">Kasir</th>
                        <th className="pb-3 pl-2 text-right">Total Tagihan</th>
                      </tr>
                    </thead>
                    <tbody>
                      {recentTransactions.map(trx => (
                        <tr key={trx.id} className="border-b border-krem-100 last:border-0 hover:bg-krem-50/50 transition">
                          <td className="py-3 text-sm font-extrabold text-coksu-900 pr-2">{trx.id}</td>
                          <td className="py-3 text-xs text-coksu-500 font-semibold px-2">{formatDate(trx.date)}</td>
                          <td className="py-3 text-sm text-coksu-700 font-bold px-2">{trx.cashier}</td>
                          <td className="py-3 text-sm font-black text-coksu-800 text-right pl-2">{formatRupiah(trx.total)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Tampilan Mobile List */}
                <div className="block md:hidden space-y-3">
                  {recentTransactions.map(trx => (
                    <div key={trx.id} className="p-3 bg-krem-50/50 border border-krem-200 rounded-2xl flex flex-col justify-between space-y-1">
                      <div className="flex justify-between items-center text-xs">
                        <span className="font-extrabold text-coksu-900">{trx.id}</span>
                        <span className="text-[10px] font-semibold text-coksu-400">{formatDate(trx.date)}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="text-[11px] text-coksu-600">Kasir: <strong className="font-bold">{trx.cashier}</strong></span>
                        <span className="text-xs font-black text-coksu-800">{formatRupiah(trx.total)}</span>
                      </div>
                    </div>
                  ))}
                  {recentTransactions.length === 0 && (
                    <p className="text-center py-6 text-sm text-coksu-400 font-bold">Belum ada transaksi terekam</p>
                  )}
                </div>
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-krem-200 p-5 md:p-6 flex flex-col justify-between">
              <div>
                <h3 className="text-base md:text-lg font-bold text-coksu-800 mb-4 flex items-center">
                  <span className="relative flex h-2.5 w-2.5 mr-2">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                  </span>
                  Stok Hampir Habis
                </h3>
                <div className="space-y-2 max-h-[220px] overflow-y-auto custom-scrollbar">
                  {lowStockProducts.map(p => (
                    <div key={p.id} className="flex justify-between items-center p-3 bg-red-50/60 rounded-2xl border border-red-100">
                      <div className="min-w-0 pr-2">

    const FinancialReports = ({ transactions, expenses }) => {
      const [filter, setFilter] = useState('all');

      const filteredTransactions = useMemo(() => {
        const now = new Date();
        return transactions.filter(trx => {
          if (filter === 'all') return true;
          const tDate = new Date(trx.date);
          if (filter === 'day') return tDate.toDateString() === now.toDateString();
          if (filter === 'month') return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
          if (filter === 'year') return tDate.getFullYear() === now.getFullYear();
          return true;
        });
      }, [transactions, filter]);

      const filteredExpenses = useMemo(() => {
        const now = new Date();
        return expenses.filter(exp => {
          if (filter === 'all') return true;
          const tDate = new Date(exp.date);
          if (filter === 'day') return tDate.toDateString() === now.toDateString();
          if (filter === 'month') return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
          if (filter === 'year') return tDate.getFullYear() === now.getFullYear();
          return true;
        });
      }, [expenses, filter]);

      const totalOmzet = filteredTransactions.reduce((sum, trx) => sum + trx.total, 0);
      const totalPengeluaran = filteredExpenses.reduce((sum, exp) => sum + exp.amount, 0);
      const labaKotor = totalOmzet - totalPengeluaran;

      const chartData = [
        { name: 'Omzet', amount: totalOmzet },
        { name: 'Pengeluaran', amount: totalPengeluaran },
        { name: 'Laba Kotor', amount: labaKotor }
      ];

      const handleExportExcel = () => {
        try {
          const wb = window.XLSX.utils.book_new();

          const summaryData = [
            ["Laporan Keuangan Kedai Titik Nol"],
            ["Periode Filter:", filter === 'all' ? 'Semua Waktu' : filter === 'day' ? 'Hari Ini' : filter === 'month' ? 'Bulan Ini' : 'Tahun Ini'],
            [],
            ["Keterangan", "Nominal (Rp)"],
            ["Total Omzet Kotor", totalOmzet],
            ["Total Pengeluaran", totalPengeluaran],
            ["Laba Kotor", labaKotor]
          ];
          const wsSummary = window.XLSX.utils.aoa_to_sheet(summaryData);
          window.XLSX.utils.book_append_sheet(wb, wsSummary, "Ringkasan Keuangan");

          const trxData = filteredTransactions.map(t => ({
            "ID Transaksi": t.id,
            "Tanggal": new Date(t.date).toLocaleString('id-ID'),
            "Kasir": t.cashier,
            "Total Item": t.items ? t.items.length : 0,
            "Total Omzet (Rp)": t.total
          }));
          const wsTrx = window.XLSX.utils.json_to_sheet(trxData);
          window.XLSX.utils.book_append_sheet(wb, wsTrx, "Riwayat Transaksi");

          const expData = filteredExpenses.map(e => ({
            "Tanggal": new Date(e.date).toLocaleString('id-ID'),
            "Keterangan Pengeluaran": e.description,
            "Nominal (Rp)": e.amount
          }));
          const wsExp = window.XLSX.utils.json_to_sheet(expData);
          window.XLSX.utils.book_append_sheet(wb, wsExp, "Riwayat Pengeluaran");

          window.XLSX.writeFile(wb, `Laporan_Keuangan_${filter}_${new Date().getTime()}.xlsx`);
        } catch (error) {
          console.error("Gagal mengekspor Excel:", error);
        }
      };

      const handleExportPDF = () => {
        try {
          const doc = new window.jspdf.jsPDF();
          const filterText = filter === 'all' ? 'Semua Waktu' : filter === 'day' ? 'Hari Ini' : filter === 'month' ? 'Bulan Ini' : 'Tahun Ini';

          doc.setFontSize(18);
          doc.setTextColor(150, 104, 63); 
          doc.text("Laporan Keuangan - Kedai Titik Nol", 14, 22);
          
          doc.setFontSize(11);
          doc.setTextColor(100);
          doc.text(`Periode: ${filterText}`, 14, 30);
          doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 36);

          doc.setFontSize(14);
          doc.setTextColor(0);
          doc.text("Ringkasan Pendapatan", 14, 50);

          window.jspdf.autoTable(doc, {
            startY: 55,
            head: [['Keterangan', 'Nominal']],
            body: [
              ['Total Pemasukan (Omzet)', formatRupiah(totalOmzet)],
              ['Total Pengeluaran', formatRupiah(totalPengeluaran)],
              ['Laba Kotor', formatRupiah(labaKotor)],
            ],
            theme: 'grid',
            headStyles: { fillColor: [150, 104, 63] }, 
            alternateRowStyles: { fillColor: [250, 247, 242] } 
          });

          let finalY = doc.lastAutoTable.finalY || 55;

          if (filteredExpenses.length > 0) {
            doc.text("Rincian Pengeluaran", 14, finalY + 15);
            window.jspdf.autoTable(doc, {
              startY: finalY + 20,
              head: [['Tanggal', 'Keterangan', 'Nominal']],
              body: filteredExpenses.map(e => [
                new Date(e.date).toLocaleDateString('id-ID'),
                e.description,
                formatRupiah(e.amount)
              ]),
              theme: 'striped',
              headStyles: { fillColor: [239, 68, 68] }, 
            });
            finalY = doc.lastAutoTable.finalY;
          }

          if (filteredTransactions.length > 0) {
            if (finalY > 220) { doc.addPage(); finalY = 20; } 
            else { finalY += 15; }

            doc.text("10 Transaksi Terakhir (Pemasukan)", 14, finalY);
            const recentTrxPDF = [...filteredTransactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
            
            window.jspdf.autoTable(doc, {
              startY: finalY + 5,

      storePhone
    }) => {
      const [cart, setCart] = useState([]);
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');
      
      const [isCheckingOut, setIsCheckingOut] = useState(false);
      const [paymentAmount, setPaymentAmount] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('Tunai'); 
      const [lastInvoice, setLastInvoice] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [checkoutError, setCheckoutError] = useState('');

      const [mobileTab, setMobileTab] = useState('menu'); 

      const filteredProducts = products.filter(p => (selectedCategory === 'all' || p.categoryId === selectedCategory) && p.name.toLowerCase().includes(searchTerm.toLowerCase()));
      const cartTotal = cart.reduce((sum, item) => sum + (item.sellPrice * item.qty), 0);

      const addToCart = (product) => {
        if (product.stock <= 0) return;
        setCart(prevCart => {
          const existing = prevCart.find(item => item.id === product.id);
          if (existing) {
            if (existing.qty >= product.stock) return prevCart;
            return prevCart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
          }
          return [...prevCart, { ...product, qty: 1 }];
        });
      };

      const updateQty = (id, delta) => {
        setCart(prevCart => prevCart.map(item => {
            if (item.id === id) {
              const newQty = item.qty + delta;
              if (newQty > item.stock) return item;
              return { ...item, qty: newQty };
            }
            return item;
          }).filter(item => item.qty > 0));
      };

      const handleCheckout = async (e) => {
        e.preventDefault();
        setCheckoutError('');
        const paid = parseInt(paymentAmount) || 0;
        
        if (paymentMethod === 'Tunai' && paid < cartTotal) { setCheckoutError("Uang tunai kurang!"); return; }

        setIsProcessing(true);
        const newTransaction = {
          id: `TRX-${Date.now().toString().slice(-6)}`, 
          date: new Date().toISOString(),
          items: cart.map(c => ({ productId: c.id, name: c.name, qty: c.qty, price: c.sellPrice, subtotal: c.sellPrice * c.qty })),
          total: cartTotal, 
          payment: paymentMethod === 'Tunai' ? paid : cartTotal,
          change: paymentMethod === 'Tunai' ? paid - cartTotal : 0,
          paymentMethod: paymentMethod, 
          cashier: user.name
        };

        try {
          await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(newTransaction) });
          
          setProducts(products.map(p => {
            const cartItem = cart.find(c => c.id === p.id);
            return cartItem ? { ...p, stock: p.stock - cartItem.qty } : p;
          }));

          addTransaction(newTransaction);
          setLastInvoice(newTransaction);
          setCart([]); setIsCheckingOut(false); setPaymentAmount(''); setPaymentMethod('Tunai'); setIsProcessing(false);
          
          setTimeout(() => window.print(), 400);
        } catch (error) {
          setCheckoutError("Gagal mengirim data! Pastikan online.");
          setIsProcessing(false);
        }
      };

      if (lastInvoice) {
        return (
          <div className="flex flex-col items-center justify-center min-h-0 py-6 pb-24 lg:pb-8 animate-fade-in-up">
            <div className="mb-4 space-x-3 print:hidden flex text-xs">
              <button onClick={() => setLastInvoice(null)} className="px-5 py-2.5 bg-white border border-krem-200 text-coksu-700 rounded-2xl font-bold hover:bg-krem-50 transition">Kembali</button>
              <button onClick={() => window.print()} className="px-5 py-2.5 bg-coksu-500 text-white rounded-2xl font-bold flex items-center hover:bg-coksu-600 transition shadow-sm"><Icon name="printer" size={14} className="mr-1.5" /> Cetak Nota</button>

    function App() {

      });

      const loadServerData = async () => {
    if (!navigator.onLine) {
        setIsLoadingData(false);
        return;
    }

    try {
        setSyncStatus("loading");

        const response = await fetch(APPS_SCRIPT_URL);
        const result = await response.json();

        if (result.status === "success") {

            setProducts(result.products || []);
            setTransactions(result.transactions || []);
            setExpenses(result.expenses || []);

            localStorage.setItem(
                "titiknol_products",
                JSON.stringify(result.products || [])
            );

            localStorage.setItem(
                "titiknol_transactions",
                JSON.stringify(result.transactions || [])
            );

            localStorage.setItem(
                "titiknol_expenses",
                JSON.stringify(result.expenses || [])
            );

            setSyncStatus("success");
        } else {
            setSyncStatus("error");
        }

    } catch (err) {
        console.error(err);
        setSyncStatus("error");
    }

    setIsLoadingData(false);
};

      const saveServerData = async (type, data) => {

    if (!navigator.onLine) return false;

    try {

        setSyncStatus("saving");

        const response = await fetch(APPS_SCRIPT_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                action: "save",

                type,

                data

            })

        });

      const syncProducts = async (data) => {
    return await saveServerData("products", data);
};

const syncTransactions = async (data) => {
    return await saveServerData("transactions", data);
};

const syncExpenses = async (data) => {
    return await saveServerData("expenses", data);
};
        
      const result = await response.json();

        if (result.status === "success") {
            setSyncStatus("saved");
            return true;
        }

        setSyncStatus("error");
        return false;

    } catch (err) {

        console.error(err);

        setSyncStatus("error");

        return false;

    }

};
      
      const [storeName, setStoreName] = useState(() => {

      const [loginError, setLoginError] = useState('');

      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncMessage, setSyncMessage] = useState(null);

      const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
      const [newProfileName, setNewProfileName] = useState('');

      const [confirmDialog, setConfirmDialog] = useState({
        isOpen: false,
        message: "",
        onConfirm: null
      });

      // PWA Hooks
      const [pwaPrompt, setPwaPrompt] = useState(null);
      const [pwaInstalled, setPwaInstalled] = useState(false);
      const [showSplash, setShowSplash] = useState(true);

      useEffect(() => {
    loadServerData();
        const interval = setInterval(() => {
        if (navigator.onLine) {
            loadServerData();
        }
    }, 30000); // setiap 30 detik

    return () => clearInterval(interval);
}, []);
      
      useEffect(() => {
        localStorage.setItem('titiknol_categories', JSON.stringify(categories));
      }, [categories]);

      useEffect(() => {
        localStorage.setItem('titiknol_products', JSON.stringify(products));
      }, [products]);

      useEffect(() => {
        localStorage.setItem('titiknol_transactions', JSON.stringify(transactions));
      }, [transactions]);

      useEffect(() => {
        localStorage.setItem('titiknol_expenses', JSON.stringify(expenses));
      }, [expenses]);

      useEffect(() => {
        if (user) {
          localStorage.setItem('titiknol_user', JSON.stringify(user));
        } else {
          localStorage.removeItem('titiknol_user');
        }
      }, [user]);

      useEffect(() => {
        const handleOnline = () => { setIsOnline(true); setSyncMessage(null); };
        const handleOffline = () => setIsOnline(false);
        // Splash screen selama 2,5 detik
const splashTimer = setTimeout(() => {
    setShowSplash(false);
}, 2500);

        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);

        // Menangkap event install PWA dari browser desktop maupun mobile
        const handlePwaPromotion = (e) => {
          e.preventDefault();
          setPwaPrompt(e);
        };
        
        const handleAppInstalled = () => {
          setPwaInstalled(true);
          setPwaPrompt(null);
        };

        window.addEventListener('beforeinstallprompt', handlePwaPromotion);
        window.addEventListener('appinstalled', handleAppInstalled);

        // Registrasi Service Worker Aktif
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('SW terdaftar pada scope:', reg.scope))
            .catch(err => console.log('Registrasi SW diabaikan/gagal:', err));
        }

        return () => {
          clearTimeout(splashTimer);
          
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
          window.removeEventListener('beforeinstallprompt', handlePwaPromotion);
          window.removeEventListener('appinstalled', handleAppInstalled);
        };
      }, []);

      const openConfirm = (message, action) => {
        setConfirmDialog({
          isOpen: true,
          message: message,
          onConfirm: () => {
            action();
            setConfirmDialog({ isOpen: false, message: "", onConfirm: null });
          }
        });
      };

      const handleSyncData = () => {
        setIsSyncing(true);
        setSyncMessage(null);

        fetch(APPS_SCRIPT_URL)
          .then(res => {
            if (!navigator.onLine) throw new Error("Offline");
            return res.json();
          })
          .then(data => {
            setIsSyncing(false);
            if (data && data.status === "success") {
              if (data.products && data.products.length > 0) setProducts(data.products);
              if (data.expenses && data.expenses.length > 0) setExpenses(data.expenses);
              if (data.transactions && data.transactions.length > 0) setTransactions(data.transactions);
              setSyncMessage({ type: 'success', text: 'Database ditarik otomatis!' });
            } else {
              setSyncMessage({ type: 'success', text: 'Koneksi aktif! Sinkronisasi siap.' });
            }
            setTimeout(() => setSyncMessage(null), 3000);
          })
          .catch(err => {
            setIsSyncing(false);
            setSyncMessage({ type: 'error', text: 'Gagal sinkronisasi data.' });
            setTimeout(() => setSyncMessage(null), 3000);
          });
      };

      const handleSaveProduct = async (productData, isEditing) => {
        const newId = productData.id || Date.now();
        const updatedProduct = { 
          ...productData, 
          id: Number(newId), 
          categoryId: parseInt(productData.categoryId),
          stock: Number(productData.stock),
          costPrice: Number(productData.costPrice),
          sellPrice: Number(productData.sellPrice)
        };
        
        if (isEditing) setProducts(prev => prev.map(p => p.id === productData.id ? updatedProduct : p));
        else setProducts(prev => [...prev, updatedProduct]);

        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'saveProduct', data: updatedProduct })
          });
        } catch (e) {
          console.error(e);
        }
      };

        setProducts(prev => prev.filter(p => p.id !== productId));

          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'deleteProduct', data: { id: productId } })
          });
        } catch (e) {
          console.error(e);
        }

          ...expenseData, 
          id: Number(newId), 
          date: expenseData.date || new Date().toISOString(),
          amount: Number(expenseData.amount)

        else setExpenses(prev => [updatedExpense, ...prev]);

        try {

            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'saveExpense', data: updatedExpense })
          });
        } catch (e) {
          console.error(e);
        }
      };

        setExpenses(prev => prev.filter(e => e.id !== expenseId));
        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },

          setLoginError('');
        } else if (loginForm.username === 'kasir' && loginForm.password === kasirPassword) {
          const cashierName = loginForm.customCashierName.trim() || 'Kasir Shift 1';
          setUser({ role: 'kasir', name: cashierName });
          setActiveTab('pos');
          setLoginError('');
        } else {
          setLoginError('Username atau password salah!');
        }
      };

      const handleLogout = () => {
        setUser(null);
        setLoginForm({ username: '', password: '', customCashierName: '' });
      };

      const handleUpdatePasswords = (role, newPass) => {
        if (role === 'admin') {
          setAdminPassword(newPass);
          localStorage.setItem('titiknol_admin_pass', newPass);
        } else {
          setKasirPassword(newPass);
          localStorage.setItem('titiknol_kasir_pass', newPass);
        }
      };

      const handleSaveStoreConfig = (name, address, phone) => {
        setStoreName(name);
        setStoreAddress(address);
        setStorePhone(phone);
        localStorage.setItem('titiknol_store_name', name);
        localStorage.setItem('titiknol_store_address', address);
        localStorage.setItem('titiknol_store_phone', phone);
        setSyncMessage({ type: 'success', text: 'Pengaturan toko berhasil disimpan!' });
        setTimeout(() => setSyncMessage(null), 3000);
      };

      const handleResetAllData = () => {
        setCategories(initialCategories);
        setProducts(initialProducts);
        setTransactions(initialTransactions);
        setExpenses(initialExpenses);
        setAdminPassword('admin123');
        setKasirPassword('kasir123');
        setStoreName('Kedai Titik Nol');
        setStoreAddress('Jl. Kenangan No. 99');
        setStorePhone('081234567890');
        localStorage.removeItem('titiknol_admin_pass');
        localStorage.removeItem('titiknol_kasir_pass');
        localStorage.removeItem('titiknol_store_name');
        localStorage.removeItem('titiknol_store_address');
        localStorage.removeItem('titiknol_store_phone');
        setSyncMessage({ type: 'success', text: 'Database lokal disetel ulang!' });
        setTimeout(() => setSyncMessage(null), 4000);
      };

      const handleOpenEditProfile = () => {
        setNewProfileName(user.name);
        setIsProfileModalOpen(true);
      };

      const handleSaveProfileName = (e) => {
        e.preventDefault();
        if (newProfileName.trim()) {
          setUser(prev => ({ ...prev, name: newProfileName.trim() }));
          setIsProfileModalOpen(false);
          setSyncMessage({ type: 'success', text: 'Nama kasir berhasil diubah!' });
          setTimeout(() => setSyncMessage(null), 3000);
        }
      };

      if (!user) {
        return (
          <div className="min-h-screen bg-krem-50 flex items-center justify-center p-4">
            <div className="bg-white p-6 md:p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-sm border border-krem-200 relative overflow-hidden text-xs">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-coksu-300 to-coksu-500"></div>
              <div className="text-center mb-6 pt-4">
                <h1 className="text-2xl font-extrabold text-coksu-700 mb-1">Kedai Titik Nol</h1>
                <p className="text-coksu-500 font-medium text-[11px]">Sistem Point of Sale Modern</p>
              </div>
              {loginError && (
                <div className="bg-red-50 text-red-600 p-2.5 rounded-2xl mb-4 text-center border border-red-100 font-semibold">
                  {loginError}
                </div>
              )}
              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block font-bold text-coksu-800 mb-1">Username</label>
                  <input 
                    type="text" 
                    className="w-full px-4 py-2.5 border border-krem-200 bg-krem-50 rounded-2xl focus:ring-2 focus:ring-coksu-400 outline-none font-medium text-coksu-900"
                    value={loginForm.username}
                    onChange={(e) => setLoginForm({...loginForm, username: e.target.value})}
                    required
                  />
                </div>
                <div>
                  <label className="block font-bold text-coksu-800 mb-1">Password</label>
                  <input 
                    type="password" 
                    className="w-full px-4 py-2.5 border border-krem-200 bg-krem-50 rounded-2xl focus:ring-2 focus:ring-coksu-400 outline-none font-medium text-coksu-900"
                    value={loginForm.password}
                    onChange={(e) => setLoginForm({...loginForm, password: e.target.value})}
                    required
                  />
                </div>

                {loginForm.username === 'kasir' && (
                  <div className="bg-coksu-50 p-3 rounded-2xl border border-coksu-100 space-y-1">
                    <label className="block font-bold text-coksu-800 mb-0.5">Nama Kasir (Opsional)</label>
                    <input 
                      type="text" 
                      placeholder="Masukkan nama kasir shift"
                      className="w-full px-3 py-1.5 border border-coksu-200 bg-white rounded-xl focus:ring-2 focus:ring-coksu-400 outline-none text-xs font-medium text-coksu-900"
                      value={loginForm.customCashierName}
                      onChange={(e) => setLoginForm({...loginForm, customCashierName: e.target.value})}
                    />
                  </div>
                )}

                <button type="submit" className="w-full bg-coksu-500 hover:bg-coksu-600 text-white font-bold py-3 px-4 rounded-2xl shadow-sm transition mt-2">
                  Masuk Sistem
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
     <>
    {showSplash && (
      <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#F8F2EA]">
        <img
          src="./images/logo-kedai.png"
          alt="Kedai Titik Nol"
          className="w-32 h-32 mb-6 animate-pulse"
        />
        <h1 className="text-4xl font-bold text-[#4A2C1A]">
          Kedai Titik Nol
        </h1>
        <p className="mt-2 text-[#8B5E3C]">
          Sistem Manajemen Kasir
        </p>
      </div>
    )}

        <div className="min-h-screen bg-krem-50 flex print:bg-white overflow-hidden relative font-sans text-xs">
          
          {/* Desktop Sidebar Panel */}
          <aside className="w-64 bg-coksu-900 text-krem-50 hidden lg:flex flex-col print:hidden shrink-0 border-r border-coksu-800">
            <div className="p-6 border-b border-coksu-800">
              <h2 className="text-xl font-extrabold text-krem-200 tracking-wide">Titik Nol.</h2>
              <p className="text-coksu-300 text-[10px] mt-0.5 font-medium">Sistem Manajemen Kasir</p>
            </div>
            
            <div className="p-4 flex items-center justify-between border-b border-coksu-800 bg-coksu-800/30">
              <div className="flex items-center space-x-3 overflow-hidden">
                <div className="w-9 h-9 rounded-xl bg-coksu-500 flex items-center justify-center font-extrabold text-white shrink-0 shadow-inner">
                  {user.name.charAt(0).toUpperCase()}
                </div>
                <div className="overflow-hidden">
                  <p className="font-bold text-xs text-white truncate" title={user.name}>{user.name}</p>
                  <p className="text-[10px] text-krem-300 font-semibold uppercase tracking-wider mt-0.5">{user.role}</p>
                </div>
              </div>
              <button 
                onClick={handleOpenEditProfile} 
                className="text-coksu-300 hover:text-white p-1.5 rounded-xl hover:bg-coksu-800 transition shrink-0"
              >
                <Icon name="edit" size={14} />
              </button>
            </div>

            <nav className="flex-1 p-3 space-y-1.5 overflow-y-auto custom-scrollbar">
              {user.role === 'admin' && (
                <>
                  <SidebarItem icon={<Icon name="dashboard" strokeWidth={2} />} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                  <SidebarItem icon={<Icon name="package" strokeWidth={2} />} label="Manajemen Menu" active={activeTab === 'products'} onClick={() => setActiveTab('products')} />
                  <SidebarItem icon={<Icon name="fileText" strokeWidth={2} />} label="Riwayat Nota" active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} />
                  <SidebarItem icon={<Icon name="trendingDown" strokeWidth={2} />} label="Pengeluaran" active={activeTab === 'expenses'} onClick={() => setActiveTab('expenses')} />
                  <SidebarItem icon={<Icon name="dollarSign" strokeWidth={2} />} label="Laporan Keuangan" active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} />
                  <SidebarItem icon={<Icon name="settings" strokeWidth={2} />} label="Pengaturan" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                </>
              )}
              {user.role === 'kasir' && (
                <>
                  <SidebarItem icon={<Icon name="cart" strokeWidth={2} />} label="Point of Sale" active={activeTab === 'pos'} onClick={() => setActiveTab('pos')} />
                  <SidebarItem icon={<Icon name="fileText" strokeWidth={2} />} label="Riwayat Transaksi" active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} />
                </>
              )}
            </nav>

            <div className="p-4 border-t border-coksu-800 bg-coksu-900">
              <button onClick={handleLogout} className="flex items-center justify-center space-x-2 text-coksu-300 hover:text-white w-full p-2.5 rounded-xl hover:bg-coksu-800 transition font-bold text-xs border border-coksu-800">
                <Icon name="logout" size={15} />
                <span>Keluar</span>
              </button>
            </div>
          </aside>

          {/* Navigasi Mobile Bawah */}
          <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-coksu-900 text-coksu-300 flex justify-around items-center h-14 z-40 border-t border-coksu-800 px-1 print:hidden">
            {user.role === 'admin' ? (
              <>
                <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'dashboard' ? 'text-white font-bold' : 'text-coksu-300'}`}>
                  <Icon name="dashboard" size={16} />
                  <span className="text-[9px] mt-0.5">Beranda</span>
                </button>
                <button onClick={() => setActiveTab('products')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'products' ? 'text-white font-bold' : 'text-coksu-300'}`}>
                  <Icon name="package" size={16} />
                  <span className="text-[9px] mt-0.5">Menu</span>
                </button>
                <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'reports' ? 'text-white font-bold' : 'text-coksu-300'}`}>
                  <Icon name="dollarSign" size={16} />
                  <span className="text-[9px] mt-0.5">Laporan</span>
                </button>
                <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'settings' ? 'text-white font-bold' : 'text-coksu-300'}`}>
                  <Icon name="settings" size={16} />
                  <span className="text-[9px] mt-0.5">Setting</span>
                </button>
                <button onClick={handleLogout} className="flex flex-col items-center justify-center flex-1 py-1 text-red-400">
                  <Icon name="logout" size={16} />
                  <span className="text-[9px] mt-0.5">Keluar</span>
                </button>
              </>
            ) : (
              <>
                <button onClick={() => setActiveTab('pos')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'pos' ? 'text-white font-bold' : 'text-coksu-300'}`}>
                  <Icon name="cart" size={16} />
                  <span className="text-[9px] mt-0.5">POS</span>
                </button>
                <button onClick={() => setActiveTab('transactions')} className={`flex flex-col items-center justify-center flex-1 py-1 ${activeTab === 'transactions' ? 'text-white font-bold' : 'text-coksu-300'}`}>
                  <Icon name="fileText" size={16} />
                  <span className="text-[9px] mt-0.5">Nota</span>
                </button>
                <button onClick={handleLogout} className="flex flex-col items-center justify-center flex-1 py-1 text-red-400">
                  <Icon name="logout" size={16} />
                  <span className="text-[9px] mt-0.5">Keluar</span>
                </button>
              </>
            )}
          </nav>

          {/* Main Area Viewport */}
          <main className="flex-1 flex flex-col h-screen overflow-hidden print:h-auto print:overflow-visible relative text-xs">
            
            {window.location.protocol === 'file:' && (
              <div className="bg-red-50 border-b border-red-200 px-4 py-2.5 text-red-800 text-[10px] md:text-xs font-semibold flex items-center justify-between print:hidden shrink-0 animate-fade-in z-30">
                <span className="flex items-center min-w-0">
                  <Icon name="alertCircle" size={14} className="mr-1.5 text-red-600 shrink-0 animate-pulse" />
                  <span className="truncate">
                    <strong>PERINGATAN DESKTOP:</strong> Berkas dibuka lokal (`file://`). Untuk memunculkan tombol instalasi di laptop/PC, Anda wajib menggunakan server lokal (`localhost`) atau alamat HTTPS.
                  </span>
                </span>
                <button onClick={() => setActiveTab('settings')} className="underline text-red-950 font-bold shrink-0 ml-2">Lihat Diagnostik</button>
              </div>
            )}

            <header className="bg-white/80 backdrop-blur-md border-b border-krem-200 h-16 md:h-20 px-4 md:px-6 flex justify-between items-center print:hidden shrink-0 z-20 sticky top-0">
              <div className="flex items-center space-x-3">
                <h2 className="text-base md:text-xl font-extrabold text-coksu-900 tracking-tight">
                  {user.role === 'admin' ? 'Administrator Panel' : 'Kasir Area'}
                </h2>
              </div>
              <div className="flex items-center space-x-2.5">
                {pwaPrompt && (
                  <button onClick={() => pwaPrompt.prompt()} className="hidden lg:flex items-center bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-xl font-extrabold transition shadow-sm animate-bounce text-[10px]">
                    <Icon name="download" size={12} className="mr-1" /> Instal POS
                  </button>
                )}
                {!isOnline ? (
                  <div className="flex items-center text-red-600 bg-red-50 px-2.5 py-1.5 rounded-xl font-bold border border-red-100 text-[10px] shrink-0 animate-pulse">
                    <Icon name="wifiOff" size={12} className="mr-1" /> Offline
                  </div>
                ) : (
                  <div className="flex items-center text-emerald-700 bg-emerald-50 px-2.5 py-1.5 rounded-xl font-bold border border-emerald-100 text-[10px] shrink-0">
                    <Icon name="cloud" size={12} className="mr-1" /> Online
                  </div>
                )}
                <button 
                  onClick={handleSyncData} disabled={isSyncing}
                  className="flex items-center px-3 py-1.5 rounded-xl font-bold transition shadow-sm border bg-white text-coksu-700 hover:bg-krem-50 border-krem-200 text-[10px] shrink-0"
                >
                  <Icon name="refreshCw" size={12} className={`mr-1 ${isSyncing ? 'animate-spin' : ''}`} /> Sinkron
                </button>
              </div>
            </header>

            {syncMessage && (
              <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-30 px-4 py-2 rounded-2xl shadow-[0_4px_15px_rgb(0,0,0,0.05)] flex items-center border bg-white border-krem-200 text-coksu-700 animate-fade-in-up text-[11px]">
                {syncMessage.type === 'error' ? <Icon name="alertCircle" size={14} className="mr-2 text-red-500 shrink-0" /> : <Icon name="checkCircle" size={14} className="mr-2 text-coksu-500 shrink-0" />}
                <span className="font-bold">{syncMessage.text}</span>
              </div>
            )}

            <div className="flex-1 overflow-y-auto p-4 md:p-8 print:p-0 bg-krem-50 custom-scrollbar">
              {user.role === 'admin' && activeTab === 'dashboard' && <AdminDashboard transactions={transactions} products={products} expenses={expenses} />}
              {user.role === 'admin' && activeTab === 'products' && <ProductManager products={products} onSaveProduct={handleSaveProduct} onDeleteProduct={handleDeleteProduct} categories={categories} openConfirm={openConfirm} />}
              {user.role === 'admin' && activeTab === 'expenses' && <ExpenseManager expenses={expenses} onSaveExpense={handleSaveExpense} onDeleteExpense={handleDeleteExpense} openConfirm={openConfirm} />}
              {user.role === 'admin' && activeTab === 'reports' && <FinancialReports transactions={transactions} expenses={expenses} />}
              
              {user.role === 'admin' && activeTab === 'settings' && (
                <SettingsPage 
                  openConfirm={openConfirm}
                  handleReset={handleResetAllData} 
                  adminPassword={adminPassword}
                  kasirPassword={kasirPassword}
                  onUpdatePasswords={handleUpdatePasswords}
                  storeName={storeName}
                  storeAddress={storeAddress}
                  storePhone={storePhone}
                  onSaveStoreConfig={handleSaveStoreConfig}
                  pwaPrompt={pwaPrompt}
                  pwaInstalled={pwaInstalled}
                />
              )}
              {user.role === 'kasir' && activeTab === 'pos' && (
                <POSSystem 
                  products={products} 
                  setProducts={setProducts} 
                  categories={categories} 
                  addTransaction={(trx) => setTransactions([trx, ...transactions])} 
                  user={user} 
                  isOnline={isOnline} 
                  onEditProfile={handleOpenEditProfile} 
                  storeName={storeName}
                  storeAddress={storeAddress}
                  storePhone={storePhone}
                />
              )}
              {activeTab === 'transactions' && <TransactionHistory transactions={transactions} user={user} />}
            </div>
          </main>

          {/* Modal Nama Kasir */}
          {isProfileModalOpen && (
            <div className="fixed inset-0 bg-coksu-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in text-xs">
              <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm overflow-hidden animate-scale-up border border-krem-200">
                <div className="p-5 border-b border-krem-100 flex justify-between items-center bg-krem-50/50">
                  <h2 className="text-sm font-extrabold text-coksu-900">Ubah Nama Kasir</h2>
                  <button onClick={() => setIsProfileModalOpen(false)} className="text-coksu-400 hover:text-coksu-700 bg-white border border-krem-200 rounded-lg p-1 transition"><Icon name="close" size={16}/></button>
                </div>
                <form onSubmit={handleSaveProfileName} className="p-5 space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-coksu-800 mb-1.5">Nama Kasir Baru</label>
                    <input required type="text" className="w-full px-4 py-2 border border-krem-200 bg-krem-50 rounded-2xl outline-none focus:ring-2 focus:ring-coksu-400 font-bold text-coksu-900" value={newProfileName} onChange={e => setNewProfileName(e.target.value)} />
                  </div>
                  <div className="flex justify-end space-x-2 text-xs font-bold">
                    <button type="button" onClick={() => setIsProfileModalOpen(false)} className="px-4 py-2 bg-white border border-krem-200 text-coksu-700 rounded-2xl">Batal</button>
                    <button type="submit" className="px-5 py-2 bg-coksu-500 text-white rounded-2xl shadow-sm">Simpan</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Jendela Konfirmasi Kustom */}
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-coksu-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in text-xs">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-xs overflow-hidden border border-krem-200 p-5 space-y-4 animate-scale-up text-center">
                <div className="space-y-1.5">
                  <h3 className="text-sm font-extrabold text-coksu-900">Konfirmasi Aksi</h3>
                  <p className="text-xs text-coksu-500 font-medium leading-relaxed">{confirmDialog.message}</p>
                </div>
                <div className="flex gap-2 font-bold">
                  <button onClick={() => setConfirmDialog({ isOpen: false, message: "", onConfirm: null })} className="flex-1 py-2 bg-white border border-krem-200 rounded-2xl text-coksu-700 transition">
                    Batal
                  </button>
                  <button onClick={confirmDialog.onConfirm} className="flex-1 py-2 bg-red-500 hover:bg-red-600 text-white rounded-2xl shadow-sm transition">
                    Ya, Hapus
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
     </>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
  
  <script>

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker
            .register('./service-worker.js')
            .then(registration => {

                console.log("✅ Service Worker berhasil didaftarkan", registration);

            })
            .catch(error => {

                console.error("❌ Gagal mendaftarkan Service Worker", error);

            });

    });

}

</script>

</body>
</html>
